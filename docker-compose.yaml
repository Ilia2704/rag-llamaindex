services:
  qdrant:
    image: qdrant/qdrant:v1.16.2
    container_name: rag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: always

  neo4j:
    image: neo4j:5.26.28-community
    container_name: rag_neo4j
    profiles:
      - graph
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    restart: always

volumes:
  qdrant_storage:
  neo4j_data:
  neo4j_logs:
